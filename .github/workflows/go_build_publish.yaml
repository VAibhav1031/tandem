# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Build and Publish

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26' 

    - name: Install dependencies
      run: go mod download

    - name: Build Executable
      run: |
        # This compiles your project. 
        # CGO_ENABLED=0 ensures a static binary with no external dependencies.
        # -o specifies the output filename.
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o tandem ./cmd/tandem-cli
    
    - name: Upload Build Artifact
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: go-executable-linux
        path: tandem
